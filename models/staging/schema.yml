version: 2

models:
  - name: stg_transactions
    description: >
      Transações

    columns:
      - name: transaction_id
        description: Identificador único da transação
        tests:
          - not_null
          - unique

      - name: client_id
        description: Identificador do cliente associado à transação
        tests:
          - not_null

      - name: asset_ticker
        description: Código do ativo

      - name: operation
        description: Tipo da operação realizada (BUY ou SELL)

        tests:
          - not_null

          - accepted_values:
              arguments:
                values: ['BUY', 'SELL']

      - name: quantity
        description: Quantidade negociada do ativo na transação

      - name: unit_price
        description: Preço unitário negociado na transação

      - name: transaction_date
        description: Data da transação

  - name: stg_clients
    description: >
      Clientes

    columns:
      - name: client_id
        description: Identificador do cliente

        tests:
          - not_null
          - unique

      - name: name
        description: Nome do cliente

      - name: city
        description: Cidade do cliente

      - name: state
        description: Estado do cliente

      - name: created_at
        description: Data do cadastro